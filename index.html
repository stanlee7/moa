<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>moa · 여러 AI가 함께 답해드려요</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --blue:#3182F6; --blue-dark:#1B64DA;
    --bg:#F2F4F6; --card:#FFFFFF;
    --t1:#191F28; --t2:#4E5968; --t3:#8B95A1; --line:#E5E8EB;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--t1);
         font-family:'Pretendard',-apple-system,'Segoe UI',sans-serif; line-height:1.6;
         -webkit-font-smoothing:antialiased; }
  .wrap { max-width:680px; margin:0 auto; padding:32px 20px 96px; }

  .brand { display:flex; align-items:center; gap:7px; font-size:16px; font-weight:700; color:var(--t1); }
  .brand .ico { font-size:20px; }
  h1 { font-size:28px; font-weight:800; letter-spacing:-.6px; margin:22px 0 8px; line-height:1.35; }
  .sub { color:var(--t3); font-size:15px; margin:0 0 28px; }

  .field { background:var(--card); border:1px solid var(--line); border-radius:18px;
           padding:6px; box-shadow:0 2px 8px rgba(0,0,0,.03); }
  textarea { width:100%; min-height:110px; resize:none; border:0; outline:0; background:transparent;
             padding:14px 14px 4px; font-size:16px; color:var(--t1); font-family:inherit; }
  textarea::placeholder { color:var(--t3); }
  .btn { width:100%; margin-top:12px; background:var(--blue); color:#fff; border:0;
         padding:16px; font-size:17px; font-weight:700; border-radius:14px; cursor:pointer;
         font-family:inherit; transition:background .15s; }
  .btn:hover { background:var(--blue-dark); }
  .btn:disabled { background:#B0C9F8; cursor:not-allowed; }

  /* 진행바 */
  .progress { margin-top:22px; display:none; }
  .progress.show { display:block; }
  .bar-track { height:8px; background:#E8EDF3; border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; width:0%; border-radius:99px; background:var(--blue); transition:width .4s ease; }
  .bar-meta { display:flex; justify-content:space-between; margin-top:11px; font-size:14px; }
  .bar-stage { color:var(--t2); font-weight:600; }
  .bar-pct { color:var(--blue); font-weight:700; font-variant-numeric:tabular-nums; }

  /* 참여 모델 */
  .models { margin-top:22px; padding:18px 20px; background:var(--card);
            border:1px solid var(--line); border-radius:18px; display:none; }
  .models.show { display:block; }
  .models-h { font-size:13px; color:var(--t3); font-weight:600; margin-bottom:14px; }
  .m-row { display:flex; gap:12px; align-items:center; margin:9px 0; }
  .m-role { font-size:14px; color:var(--t2); font-weight:600; min-width:62px; }
  .m-list { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { font-size:12.5px; font-weight:600; padding:5px 12px; border-radius:99px;
          background:#EFF3FA; color:var(--blue); }

  /* 답변 카드 */
  .out { margin-top:22px; background:var(--card); border:1px solid var(--line);
         border-radius:18px; padding:26px; display:none; font-size:15.5px; color:var(--t1);
         box-shadow:0 2px 8px rgba(0,0,0,.03); }
  .out.show { display:block; }
  .out h1,.out h2,.out h3 { letter-spacing:-.4px; margin:20px 0 10px; }
  .out h1 { font-size:21px; } .out h2 { font-size:18px; } .out h3 { font-size:16px; }
  .out p { margin:10px 0; }
  .out table { border-collapse:collapse; width:100%; margin:14px 0; font-size:14px; }
  .out th,.out td { border:1px solid var(--line); padding:9px 11px; text-align:left; }
  .out th { background:#F7F9FB; font-weight:700; }
  .out code { background:#F2F4F6; padding:2px 6px; border-radius:6px; font-size:13.5px; }
  .out pre { background:#F2F4F6; padding:14px; border-radius:12px; overflow:auto; }
  .out pre code { background:none; padding:0; }
  .out ul,.out ol { padding-left:20px; }
  .out blockquote { margin:12px 0; padding:8px 16px; border-left:3px solid var(--blue);
                    color:var(--t2); background:#F7F9FB; border-radius:0 8px 8px 0; }

  .foot { margin-top:36px; color:var(--t3); font-size:13px; text-align:center; }
  .foot a { color:var(--t2); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="ico">🧩</span> moa</div>
  <h1>여러 AI가 모여<br>함께 답해드려요</h1>
  <p class="sub">하나의 질문을 여러 무료 오픈모델이 나눠 맡아 · 계획 → 분담 → 검증 → 종합</p>

  <div class="field">
    <textarea id="q" placeholder="무엇이든 물어보세요&#10;예) 2026년 1인 가구를 위한 정부 지원제도를 정리해줘"></textarea>
    <button class="btn" id="go" onclick="ask()">물어보기</button>
  </div>

  <div class="progress" id="prog">
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="bar-meta">
      <span class="bar-stage" id="stage">시작하는 중</span>
      <span class="bar-pct" id="pct">0%</span>
    </div>
  </div>

  <div class="models" id="models"></div>
  <div class="out" id="out"></div>

  <p class="foot">오픈소스 · <a href="https://github.com/stanlee7/moa" target="_blank">github.com/stanlee7/moa</a></p>
</div>

<script>
const STAGES = [
  { at: 0,  text: "🧠 계획 세우는 중" },
  { at: 6,  text: "👥 여러 모델이 각자 답하는 중" },
  { at: 22, text: "🔍 답변 교차 검증 중" },
  { at: 38, text: "✍️ 최종 답변 종합 중" },
];
let timer = null;

function startProgress() {
  const bar = document.getElementById('bar'), pct = document.getElementById('pct'),
        stage = document.getElementById('stage');
  document.getElementById('prog').className = 'progress show';
  const t0 = Date.now();
  timer = setInterval(() => {
    const el = (Date.now() - t0) / 1000;
    const p = Math.min(95, 100 * (1 - Math.exp(-el / 22)));
    bar.style.width = p.toFixed(1) + '%';
    pct.textContent = Math.floor(p) + '%';
    const s = STAGES.filter(s => el >= s.at).pop();
    if (s) stage.textContent = s.text;
  }, 200);
}
function finishProgress(success) {
  clearInterval(timer);
  document.getElementById('bar').style.width = '100%';
  document.getElementById('pct').textContent = '100%';
  document.getElementById('stage').textContent = success ? '✅ 완료' : '⚠️ 실패';
}

function prettyModel(id) { return id.split('/').pop().replace(':free', ''); }

function renderModels(used) {
  const box = document.getElementById('models');
  if (!used || !used.length) { box.className = 'models'; return; }
  const groups = {};
  used.forEach(u => { (groups[u.role] = groups[u.role] || []).push(prettyModel(u.model)); });
  let html = '<div class="models-h">이 답변에 참여한 무료 오픈모델</div>';
  for (const role in groups) {
    const chips = [...new Set(groups[role])].map(n => `<span class="chip">${n}</span>`).join('');
    html += `<div class="m-row"><span class="m-role">${role}</span><span class="m-list">${chips}</span></div>`;
  }
  box.innerHTML = html;
  box.className = 'models show';
}

async function ask() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const btn = document.getElementById('go'), out = document.getElementById('out');
  btn.disabled = true;
  out.className = 'out'; out.innerHTML = '';
  document.getElementById('models').className = 'models';
  startProgress();
  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'moa', messages: [{ role: 'user', content: q }] })
    });
    if (!res.ok) throw new Error('서버 응답 ' + res.status);
    const data = await res.json();
    const md = data.choices[0].message.content;
    finishProgress(true);
    renderModels(data.moa_models);
    out.innerHTML = window.marked ? marked.parse(md) : md.replace(/\n/g, '<br>');
    out.className = 'out show';
  } catch (e) {
    finishProgress(false);
    out.textContent = '오류: ' + e.message + ' (무료 모델 호출 한도일 수 있어요. 잠시 후 다시 시도)';
    out.className = 'out show';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
