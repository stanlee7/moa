<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fugu-kr · 오픈모델 AI 팀</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root { --bg:#0b0d10; --card:#15181d; --line:#262b33; --fg:#e8eaed; --sub:#9aa3af; --accent:#5b8cff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo',sans-serif;
         background:var(--bg); color:var(--fg); line-height:1.6; }
  .wrap { max-width:780px; margin:0 auto; padding:40px 20px 80px; }
  h1 { font-size:26px; margin:0 0 4px; letter-spacing:-.5px; }
  h1 .fish { font-size:30px; }
  .tag { color:var(--sub); font-size:14px; margin-bottom:28px; }
  .tag b { color:var(--accent); }
  textarea { width:100%; min-height:96px; resize:vertical; padding:16px; font-size:15px;
             background:var(--card); color:var(--fg); border:1px solid var(--line);
             border-radius:12px; outline:none; }
  textarea:focus { border-color:var(--accent); }
  .row { display:flex; gap:10px; margin-top:12px; align-items:center; }
  button { background:var(--accent); color:#fff; border:0; padding:13px 24px; font-size:15px;
           font-weight:600; border-radius:10px; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .hint { color:var(--sub); font-size:13px; }

  /* 진행바 (다운로딩 느낌) */
  .progress { margin-top:20px; display:none; }
  .progress.show { display:block; }
  .bar-track { height:10px; background:var(--line); border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; width:0%; border-radius:6px;
              background:linear-gradient(90deg,#5b8cff,#8a6cff);
              transition:width .4s ease; }
  .bar-meta { display:flex; justify-content:space-between; margin-top:10px; font-size:13px; }
  .bar-stage { color:var(--fg); }
  .bar-pct { color:var(--accent); font-weight:700; font-variant-numeric:tabular-nums; }

  .out { margin-top:28px; background:var(--card); border:1px solid var(--line);
         border-radius:12px; padding:24px; display:none; }
  .out.show { display:block; }
  .out table { border-collapse:collapse; width:100%; margin:12px 0; font-size:14px; }
  .out th,.out td { border:1px solid var(--line); padding:8px 10px; text-align:left; }
  .out h1,.out h2,.out h3 { margin:18px 0 8px; }
  .out code { background:#0b0d10; padding:2px 6px; border-radius:5px; }
  .foot { margin-top:40px; color:var(--sub); font-size:13px; text-align:center; }
  .foot a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="fish">🐡</span> fugu-kr</h1>
  <p class="tag">하나의 입력 뒤에서 <b>여러 무료 오픈모델이 팀으로 협업</b>합니다 ·
     계획 → 분담 → 검증 → 종합</p>

  <textarea id="q" placeholder="무엇이든 물어보세요. 예) 2026년 1인 가구를 위한 정부 지원제도를 정리해줘"></textarea>
  <div class="row">
    <button id="go" onclick="ask()">보내기</button>
    <span class="hint" id="hint">답변까지 최대 1분 정도 걸려요.</span>
  </div>

  <div class="progress" id="prog">
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="bar-meta">
      <span class="bar-stage" id="stage">시작하는 중...</span>
      <span class="bar-pct" id="pct">0%</span>
    </div>
  </div>

  <div class="out" id="out"></div>

  <p class="foot">오픈소스 · <a href="https://github.com/stanlee7/fugu-kr" target="_blank">github.com/stanlee7/fugu-kr</a></p>
</div>

<script>
// 실제 파이프라인 순서에 맞춘 단계 (시작 경과초, 라벨)
const STAGES = [
  { at: 0,  text: "🧠 계획 세우는 중" },
  { at: 6,  text: "👥 여러 모델이 각자 답하는 중" },
  { at: 22, text: "🔍 답변 교차 검증 중" },
  { at: 38, text: "✍️ 최종 답변 종합 중" },
];

let timer = null;

function startProgress() {
  const bar = document.getElementById('bar');
  const pct = document.getElementById('pct');
  const stage = document.getElementById('stage');
  document.getElementById('prog').className = 'progress show';
  const t0 = Date.now();
  timer = setInterval(() => {
    const el = (Date.now() - t0) / 1000;
    // 95%까지 점점 느리게 차오름 (응답 오면 100%로 마무리)
    const p = Math.min(95, 100 * (1 - Math.exp(-el / 22)));
    bar.style.width = p.toFixed(1) + '%';
    pct.textContent = Math.floor(p) + '%';
    const s = STAGES.filter(s => el >= s.at).pop();
    if (s) stage.textContent = s.text;
  }, 200);
}

function finishProgress(success) {
  clearInterval(timer);
  document.getElementById('bar').style.width = '100%';
  document.getElementById('pct').textContent = '100%';
  document.getElementById('stage').textContent = success ? '✅ 완료' : '⚠️ 실패';
}

async function ask() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const btn = document.getElementById('go');
  const out = document.getElementById('out');
  btn.disabled = true;
  out.className = 'out'; out.innerHTML = '';
  startProgress();
  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'fugu-kr', messages: [{ role: 'user', content: q }] })
    });
    if (!res.ok) throw new Error('서버 응답 ' + res.status);
    const data = await res.json();
    const md = data.choices[0].message.content;
    finishProgress(true);
    out.innerHTML = window.marked ? marked.parse(md) : md.replace(/\n/g, '<br>');
    out.className = 'out show';
  } catch (e) {
    finishProgress(false);
    out.textContent = '오류: ' + e.message + ' (무료 모델 호출 한도일 수 있어요. 잠시 후 다시 시도)';
    out.className = 'out show';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
